<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1917;
      --sand: #f5f0e8;
      --accent: #b85c2c;
      --accent-light: #d4784a;
      --muted: #8a7d72;
      --border: #e0d8ce;
      --white: #fdfaf6;
    }

    body {
      background: var(--sand);
      color: var(--ink);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 5rem 1.5rem 6rem;
    }

    /* ── HEADER ── */
    .page-header { margin-bottom: 3rem; }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 14px;
    }

    .page-title em {
      font-style: italic;
      color: var(--accent-light);
    }

    .page-subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      max-width: 460px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      margin-bottom: 2.5rem;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 8px;
      margin-bottom: 8px;
    }

    .search-row svg {
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--ink);
    }

    .search-input::placeholder { color: #c2b8ae; }

    .result-count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── ARTICLE LIST ── */
    .article-list { display: flex; flex-direction: column; }

    .article-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1rem 1.5rem;
      padding: 1.6rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .article-item:first-child { border-top: 1px solid var(--border); }

    .article-item:hover .article-title { color: var(--accent); }
    .article-item:hover .arrow { transform: translateX(4px); opacity: 1; }

    .article-left { display: flex; flex-direction: column; gap: 7px; }

    .article-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .meta-text {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      transition: color 0.2s;
    }

    .article-excerpt {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      max-width: 560px;
    }

    .arrow {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.35;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 4rem 0;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
    }

    /* ── FOOTER NOTE ── */
    .footer-note {
      margin-top: 3rem;
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .page { padding: 3rem 1.25rem 4rem; }
      .article-item { grid-template-columns: 1fr; }
      .arrow { display: none; }
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- HEADER -->
    <!-- ✏️ Change the eyebrow label, title, and subtitle here -->
    <header class="page-header">
      <p class="eyebrow">KNOWLEDGE BASE</p>
      <h1 class="page-title">Articles &amp; <em>Insights</em></h1>
      <p class="page-subtitle">
        Get the latest news and trends in the world of Cyber-security <br><em> </em>Research, walkthroughs, and insights written by our team.
      </p>
    </header>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-row">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" type="text" id="search" placeholder="Search articles…" />
      </div>
      <p class="result-count" id="count"></p>
    </div>

    <!-- ARTICLE LIST -->
    <div class="article-list" id="list"></div>

    <p class="footer-note">We post new articles quarterly <br><em> </em>Check back regularly.</p>

  </div>

  <script>
    /*
    =====================================================
      ✏️  YOUR ARTICLES 
      Each article has:
        title    — the heading shown on the page
        excerpt  — the short description below the title
        author   — writer's name
        date     — display date (any format you like)
        readTime — e.g. "5 min read"
        tag      — short label shown as a coloured badge
        href     — link to the full article ("#" = no link yet)
        tagBg    — background colour for the tag badge
        tagColor — text colour for the tag badge
    =====================================================
    */
    const articles = [
      {
        title: "Cybersecurity in 2026",
        excerpt: "Cybersecurity in 2026 entails the key threats, countermeasures as well as what to expect in future.",
        author: "...",
        date: "Apr 18, 2025",
        readTime: "6 min read",
        tag: "Trends",
        href: "#",
        tagBg: "#e8f0fe",
        tagColor: "#1a56db"
      },
      {
        title: "Debrief January - April",
        excerpt: "Read on what happened during the first quarter of 2026 in the world of cyberecurity and possible trends.",
        author: "Encrava",
        date: "Apr 30, 2026",
        readTime: "12 min read",
        tag: "Blogs",
        href: "#",
        tagBg: "#fce8f3",
        tagColor: "#9d174d"
      },
      {
        title: "Understanding The Mind of an Attacker",
        excerpt: "Know what an attacker ....",
        author: "...",
        date: "Jan 12, 2026",
        readTime: "10 min read",
        tag: "Attacks",
        href: "#",
        tagBg: "#e8f5e9",
        tagColor: "#276749"
      },
      {
        title: "Who and What is Encrava?",
        excerpt: "Find out what we do and what we stand for as a company.",
        author: "Encrava",
        date: "Apr 7, 2026",
        readTime: "8 min read",
        tag: "About Us",
        href: "#",
        tagBg: "#fff3e0",
        tagColor: "#92400e"
      },
      
    ];

    /* ── Render ── */
    const listEl  = document.getElementById('list');
    const countEl = document.getElementById('count');
    const searchEl = document.getElementById('search');

    function render(query) {
      const q = query.toLowerCase().trim();
      const filtered = q
        ? articles.filter(a =>
            a.title.toLowerCase().includes(q) ||
            a.excerpt.toLowerCase().includes(q) ||
            a.tag.toLowerCase().includes(q) ||
            a.author.toLowerCase().includes(q)
          )
        : articles;

      countEl.textContent = filtered.length + (filtered.length === 1 ? ' article found' : ' articles found');

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty">
            <p class="empty-title">Nothing found</p>
            <p class="empty-sub">Try a different search term.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = filtered.map(a => `
        <a class="article-item" href="${a.href}">
          <div class="article-left">
            <div class="article-meta">
              <span class="tag" style="background:${a.tagBg};color:${a.tagColor}">${a.tag}</span>
              <span class="dot"></span>
              <span class="meta-text">${a.author}</span>
              <span class="dot"></span>
              <span class="meta-text">${a.date}</span>
              <span class="dot"></span>
              <span class="meta-text">${a.readTime}</span>
            </div>
            <h2 class="article-title">${a.title}</h2>
            <p class="article-excerpt">${a.excerpt}</p>
          </div>
          <svg class="arrow" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      `).join('');
    }

    render('');
    searchEl.addEventListener('input', e => render(e.target.value));
  </script>

</body>
</html>
